
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>陪伴妈妈的小空间</title>
    
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22%23E0BBE4%22/><text x=%2250%%22 y=%2250%%22 dominant-baseline=%22central%22 text-anchor=%22middle%22 font-family=%22Arial%22 font-size=%2260%22 fill=%22white%22>A</text></svg>">

    <style>
        :root {
            --bg-color: #AFC2DB;
            --text-color: #0020A5;
            --btn-color: #FFF200;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: "Microsoft YaHei", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: background-color 0.5s ease;
        }

        /* 核心爱心展示区 */
        #main-container {
            text-align: center;
            padding: 20px;
            width: 80%;
            min-height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .heart-icon {
            font-size: 80px;
            cursor: pointer;
            margin-bottom: 20px;
            user-select: none;
            transition: transform 0.2s;
        }

        .heart-icon:active {
            transform: scale(0.9);
        }

        /* 歌词文案显示 */
        #lyric-display {
            font-size: 1.1rem;
            line-height: 1.8;
            white-space: pre-wrap;
            min-height: 100px;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        /* 底部按钮区 */
        .btn-group {
            margin-top: 30px;
            display: flex;
            gap: 20px;
        }

        button {
            background-color: var(--btn-color);
            color: var(--text-color);
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        button:active {
            transform: translateY(2px);
            box-shadow: none;
        }

        /* 应援按钮样式 */
        .support-btn {
            position: absolute;
            bottom: 40px;
            background-color: rgba(255,255,255,0.3);
            color: #fff;
            padding: 8px 20px;
            font-size: 0.9rem;
        }

        /* 全屏应援遮罩 */
        #support-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            cursor: pointer;
        }

        .slogan {
            color: #FFF200;
            font-size: 1.5rem;
            line-height: 2.5;
            text-align: center;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div id="main-container">
        <div class="heart-icon" onclick="showLyric()">💙</div>
        <div id="lyric-display">点击上面的爱心，听听深深的歌词...</div>
    </div>

    <div class="btn-group">
        <button onclick="showMessage('929')">929</button>
        <button onclick="showMessage('🌸')">🌸</button>
    </div>

    <button class="support-btn" onclick="toggleSupport()">应援</button>

    <div id="support-overlay" onclick="toggleSupport()">
        <div class="slogan">
            卡布所在，音之天籁。<br>
            风雨同周，深情不移。
        </div>
    </div>

    <script>
        const lyrics = [
            "你愿相信什么，就把世界看成什么样。偶尔难题加点重量，越要轻轻地旋转。\n                                                          ——​​《小美满》​​",
            "长吧，像树一样，触碰天堂，勇敢地，坚定地，拥抱世界的晴朗。\n                                                                 ——《芽》​​",
            "永远轻盈，永远滚烫，不愿下沉，不肯下降。\n                                           ———《亲爱的旅人啊》​​",
            "和光同行，跌跌撞撞的摸索；和光同舞，奋不顾身的坎坷。\n                                                  ———《和光同尘》​​",
            "做生活困兽，不如去浪漫宇宙。\n                                           ———《我以渺小爱你》​​",
            "既有自己做情人，何必劳心费力爱世人\n                                                          ———《不群》​​",
            "好好生活，原来就是美好生活。\n                           ———《好好生活就是美好生活》",
            "每一个平凡的日子，因为你而有了意义。\n                                                          ———《微光》",
            "你是人间最美的相遇，也是时光里不凋谢的花。\n                                                  ———《一路生花》​​",
            "愿你此生辽阔，也愿你此生无忧。\n                                                          ———《大鱼》"
        ];

        let lastIndex = -1;

        function showLyric() {
            const display = document.getElementById('lyric-display');
            display.style.opacity = 0;
            
            setTimeout(() => {
                let randomIndex;
                do {
                    randomIndex = Math.floor(Math.random() * lyrics.length);
                } while (randomIndex === lastIndex);
                
                lastIndex = randomIndex;
                display.innerText = lyrics[randomIndex];
                display.style.opacity = 1;
            }, 200);
        }

        function showMessage(type) {
            const display = document.getElementById('lyric-display');
            display.style.opacity = 0;
            setTimeout(() => {
                if(type === '929') {
                    display.innerText = "\n抓一颗流星，祝福你要幸福。";
                } else {
                    display.innerText = "\n花开忘忧，愿你无忧。";
                }
                display.style.opacity = 1;
            }, 200);
        }

        function toggleSupport() {
            const overlay = document.getElementById('support-overlay');
            if (overlay.style.display === 'flex') {
                overlay.style.display = 'none';
            } else {
                overlay.style.display = 'flex';
            }
        }
    </script>
</body>
</html>
